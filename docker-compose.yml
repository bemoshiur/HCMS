services:
  db:
    image: postgis/postgis:16-3.4
    container_name: hcms-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hcms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hcms_demo_password}
      POSTGRES_DB: ${POSTGRES_DB:-hcms}
    ports:
      - "5432:5432"
    volumes:
      - hcms-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hcms} -d ${POSTGRES_DB:-hcms}"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hcms-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hcms}:${POSTGRES_PASSWORD:-hcms_demo_password}@db:5432/${POSTGRES_DB:-hcms}
      AUTH_SECRET: ${AUTH_SECRET:-hcms-demo-only-secret-change-in-production}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    # migrate + seed + serve is the image's default CMD (see Dockerfile)

volumes:
  hcms-pgdata:
