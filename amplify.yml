# AWS Amplify Hosting build spec — Next.js SSR (WEB_COMPUTE platform).
# Deploys hcms.ticonsys.com. DATABASE_URL / AUTH_SECRET / AUTH_TRUST_HOST are
# set as Amplify environment variables (Console → App settings → Environment
# variables), never committed.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        # corepack reads "packageManager" in package.json → pnpm@10.33.3 (matches the lockfile)
        - corepack enable
        - pnpm install --frozen-lockfile
        - npx prisma generate
        # Apply pending migrations against Neon's DIRECT endpoint (the pooled
        # PgBouncer endpoint can't hold migrate's advisory lock — P1002).
        # Non-fatal: the demo schema is already migrated, and a transient lock
        # timeout must not fail the deploy. Run migrations manually for changes.
        - DATABASE_URL="${DIRECT_URL:-$DATABASE_URL}" npx prisma migrate deploy || echo "migrate deploy skipped (already applied or lock contention) — continuing build"
    build:
      commands:
        # Amplify does NOT expose console env vars to the SSR runtime by default.
        # Write the server-side vars into .env.production so Next.js loads them
        # at request time on the compute (Lambda). See:
        # https://docs.aws.amazon.com/amplify/latest/userguide/ssr-environment-variables.html
        - env | grep -e DATABASE_URL -e AUTH_SECRET -e AUTH_TRUST_HOST -e NEXT_PUBLIC_ >> .env.production
        - pnpm build
  artifacts:
    # Amplify auto-detects Next.js SSR from the .next output
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
